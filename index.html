<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цветок</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: relative;
            background-image: url('BG.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 1;
            position: relative;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: rgba(76, 175, 80, 0.9);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
            background: rgba(76, 175, 80, 1);
        }

        .flower {
            position: absolute;
            display: none;
            width: 200px;
            height: 200px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: opacity 0.5s ease;
            z-index: 2;
        }

        .flower.show {
            display: block;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Полупрозрачный оверлей для читаемости -->
    <div class="overlay"></div>

    <!-- Аудио фон (цикличное) -->
    <audio autoplay loop volume="0.3">
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <button onclick="showFlower(event)">🌿 Показать цветок</button>
    </div>

    <img id="flowerImg" class="flower" src="flower.png" alt="Цветок">

    <script>
        function showFlower(event) {
            const flower = document.getElementById('flowerImg');
            const button = event.target;
            flower.classList.add('show');
            button.style.display = 'none';
        }
    </script>
</body>
</html>
