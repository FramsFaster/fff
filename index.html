<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цветок за курсором</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: relative;
            background-image: url('BG.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 2;
            position: relative;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: rgba(76, 175, 80, 0.9);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
            background: rgba(76, 175, 80, 1);
        }

        .flower {
            position: absolute;
            top: -500px; /* изначально вне экрана */
            left: -500px;
            width: 120px;
            height: 120px;
            pointer-events: none; /* чтобы не мешал кликам */
            transition: 
                transform 0.3s cubic-bezier(0.3, 0.7, 0.4, 1);
            z-index: 3;
            opacity: 0;
        }

        .flower.visible {
            opacity: 1;
        }

        .flower img {
            width: 100%;
            height: 100%;
            display: block;
            transition: all 0.3s ease;
        }

        .flower img:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <!-- Аудио фон -->
    <audio autoplay loop volume="0.3">
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <button id="showFlowerBtn">🌸 Показать цветок</button>
    </div>

    <div id="flower" class="flower">
        <img src="flower.png" alt="Цветок">
    </div>

    <script>
        const button = document.getElementById('showFlowerBtn');
        const flower = document.getElementById('flower');

        let folloverEnabled = false;

        button.addEventListener('click', () => {
            folloverEnabled = true;
            flower.classList.add('visible');
            button.style.display = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!folloverEnabled) return;

            const x = e.clientX;
            const y = e.clientY;

            // плавное движение через transform
            flower.style.transform = `translate(${x - 60}px, ${y - 80}px)`;
        });
    </script>
</body>
</html>
