<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт со своим шрифтом</title>
    <style>
        @font-face {
            font-family: 'MyFont';
            src: url('Chair406.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: 'MyFont', Arial, sans-serif;
            overflow: hidden;
            position: relative;
            background-image: url('BG.jpg');
            background-size: cover;
            background-position: center;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: all;
            z-index: 10;
            cursor: none;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 20;
            position: relative;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .container.hidden {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }

        h1 {
            font-family: 'MyFont', sans-serif;
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #4CAF50;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: rgba(76, 175, 80, 0.9);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            font-family: 'MyFont', Arial, sans-serif;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
            background: rgba(76, 175, 80, 1);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="overlay"></div>

    <div class="container" id="container">
        <h1>🌸 123 MY Font шрифт работает!</h1>
        <button id="startBtn">Играть!</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('container');
        const startBtn = document.getElementById('startBtn');

        let mouseX = 0;
        let mouseY = 0;
        let gameActive = false;
        let dots = [];

        // Загрузка изображения цветка
        const flowerImg = new Image();
        flowerImg.src = 'flower.png';

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Отслеживание мыши
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        // Клик мышью для сбора кружков
        canvas.addEventListener('click', (e) => {
            if (!gameActive) return;
            
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            
            // Проверяем попадание по кружкам
            for (let i = dots.length - 1; i >= 0; i--) {
                const dot = dots[i];
                const dx = clickX - dot.x;
                const dy = clickY - dot.y;
                if (Math.sqrt(dx * dx + dy * dy) < dot.radius) {
                    dots.splice(i, 1); // Удаляем кружок
                }
            }
        });

        class Dot {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = 20;
                this.life = 5000; // 5 секунд
                this.maxLife = 5000;
            }

            update(dt) {
                this.life -= dt;
                this.radius = 20 * (this.life / this.maxLife);
                return this.life > 0;
            }

            draw() {
                const alpha = this.life / this.maxLife;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#FFA500';
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.restore();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameActive) {
                // Рисуем цветок на позиции курсора
                if (flowerImg.complete) {
                    ctx.drawImage(flowerImg, mouseX - 25, mouseY - 25, 50, 50);
                }

                // Обновляем и рисуем кружки
                dots = dots.filter(dot => {
                    dot.update(16);
                    dot.draw();
                    return dot.life > 0;
                });

                // Добавляем новые кружки
                if (Math.random() < 0.08) {
                    dots.push(new Dot());
                }
            }

            requestAnimationFrame(animate);
        }

        // Обработчик кнопки
        startBtn.addEventListener('click', () => {
            gameActive = true;
            container.classList.add('hidden');
            
            // Очистка старых кружков
            dots = [];
        });

        // Запуск анимации после загрузки изображения
        flowerImg.onload = () => {
            animate();
        };
    </script>
</body>
</html>
