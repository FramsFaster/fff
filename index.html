<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт со своим шрифтом</title>
    <style>
        /* ЗАГРУЗКА ШРИФТА с локального файла */
        @font-face {
            font-family: 'MyFont'; /* любое имя для шрифта */
            src: url('Chair406.otf') format('truetype'); /* путь к твоему файлу */
            /* Если есть несколько форматов, добавь их все: */
            /* src: url('Chair406.otf') format('otf'),
                  url('Chair406.otf') format('otf'),
                  url('MyFont.otf') format('truetype'); */
            font-weight: normal;
            font-style: normal;
            font-display: swap; /* шрифт быстро загрузится */
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'MyFont', Arial, sans-serif; /* твой шрифт + запасной */
            overflow: hidden;
            position: relative;
            background-image: url('BG.jpg');
            background-size: cover;
            background-position: center;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 2;
            position: relative;
            font-family: 'MyFont', Arial, sans-serif;
        }

        h1 {
            font-family: 'MyFont', sans-serif;
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #4CAF50;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: rgba(76, 175, 80, 0.9);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            font-family: 'MyFont', Arial, sans-serif;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
            background: rgba(76, 175, 80, 1);
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="container">
        <h1>🌸 123 MY Font шрифт работает!</h1>
        <button onclick="alert('Шрифт загружен!')">Проверить</button>
    </div>
</body>
</html>
