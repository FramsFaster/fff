<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт со своим шрифтом</title>
    <style>
        /* ЗАГРУЗКА ШРИФТА с локального файла */
        @font-face {
            font-family: 'MyFont'; /* любое имя для шрифта */
            src: url('Chair406.otf') format('opentype'); /* путь к твоему файлу */
            font-weight: normal;
            font-style: normal;
            font-display: swap; /* шрифт быстро загрузится */
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'MyFont', Arial, sans-serif; /* твой шрифт + запасной */
            overflow: hidden;
            position: relative;
            background-image: url('BG.jpg');
            background-size: cover;
            background-position: center;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 2;
            position: relative;
            font-family: 'MyFont', Arial, sans-serif;
        }

        h1 {
            font-family: 'MyFont', sans-serif;
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #4CAF50;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: rgba(76, 175, 80, 0.9);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            font-family: 'MyFont', Arial, sans-serif;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
            background: rgba(76, 175, 80, 1);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="overlay"></div>

    <div class="container">
        <h1>🌸 123 MY Font шрифт работает!</h1>
        <button id="startBtn">Запустить игру</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        let mouseX = 0;
        let mouseY = 0;
        let flowers = []; // след цветка за мышью
        let dots = []; // собираемые точки
        let gameActive = false;

        // Загрузка изображения цветка
        const flowerImg = new Image();
        flowerImg.src = 'flower.png';

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Отслеживание мыши
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        class Flower {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.life = 1.0;
            }

            update() {
                this.life -= 0.02;
                return this.life > 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.drawImage(flowerImg, this.x - 25, this.y - 25, 50, 50);
                ctx.restore();
            }
        }

        class Dot {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = 15;
                this.life = 5000; // 5 секунд в мс
                this.maxLife = 5000;
            }

            update(dt) {
                this.life -= dt;
                this.radius = 15 * (this.life / this.maxLife);
                return this.life > 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life / this.maxLife;
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#FFA500';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();
            }

            checkCollision(mx, my) {
                const dx = mx - this.x;
                const dy = my - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.radius;
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Обновление и рисование цветков следа
            if (gameActive) {
                flowers = flowers.filter(flower => {
                    flower.update();
                    flower.draw();
                    return flower.life > 0;
                });
                flowers.unshift(new Flower(mouseX, mouseY));

                // Проверка сбора точек
                dots = dots.filter(dot => {
                    if (dot.checkCollision(mouseX, mouseY)) {
                        return false; // исчезает
                    }
                    dot.update(16); // ~60fps
                    dot.draw();
                    return true;
                });

                // Добавление новых точек
                if (Math.random() < 0.1) { // примерно 6 точек в секунду
                    dots.push(new Dot());
                }
            }

            requestAnimationFrame(animate);
        }

        startBtn.addEventListener('click', () => {
            gameActive = !gameActive;
            startBtn.textContent = gameActive ? 'Игра активна' : 'Запустить игру';
            if (gameActive) {
                // Очистка при старте
                flowers = [];
                dots = [];
            }
        });

        // Ждем загрузки изображения
        flowerImg.onload = () => {
            animate();
        };
    </script>
</body>
</html>
